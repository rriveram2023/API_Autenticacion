worker_processes  1;

events {
    worker_connections  1024;
}

http {
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    upstream auth_api_backend {
        server 127.0.0.1:8001;
    }

    upstream oauth2_proxy_backend {
        server 127.0.0.1:4180;
    }

    server {
        listen 80;
        server_name e3display.com;

        return 301 https://$host$request_uri;
    }

    server {
        listen 8087;
        server_name e3display.com;

        return 301 https://e3display.com$request_uri;
    }

    server {
        listen 443 ssl;
        server_name e3display.com;

        ssl_certificate      D:/Archivos_rriveram/Desarrollos/API_Autenticacion/nginx/certs/fullchain.crt;
        ssl_certificate_key  D:/Archivos_rriveram/Desarrollos/API_Autenticacion/nginx/certs/private.key;
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          HIGH:!aNULL:!MD5;

        location /oauth2/ {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Auth-Request-Redirect $request_uri;
            proxy_set_header X-Authenticated-User "";
        }

        location = /auth/callback {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/login {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/logout {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/ad-health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /oauth2/auth {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location @entra_login {
            return 302 /oauth2/start?rd=$request_uri;
        }

        location /auth/ {
            auth_request /oauth2/auth;
            error_page 401 = @entra_login;

            auth_request_set $usuario $upstream_http_x_auth_request_user;
            auth_request_set $correo $upstream_http_x_auth_request_email;
            auth_request_set $grupos $upstream_http_x_auth_request_groups;

            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Authenticated-User $usuario;
            proxy_set_header X-Authenticated-Email $correo;
            proxy_set_header X-Authenticated-Groups $grupos;
            proxy_set_header X-Authenticated-Display-Name $usuario;
            proxy_set_header X-Auth-Mfa-Policy entra_standard;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }
    }
}

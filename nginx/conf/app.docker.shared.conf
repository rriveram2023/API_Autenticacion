worker_processes  1;

events {
    worker_connections  1024;
}

http {
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;
    upstream auth_api_backend {
        server auth-api:8001;
    }
    upstream e3os_entraid_backend {
        server host.docker.internal:5001;
    }
upstream oauth2_proxy_backend {
        server oauth2-proxy:4180;
    }

    server {
        listen 80;
        server_name e3display.com;

        location /oauth2/ {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Auth-Request-Redirect $scheme://$http_host$request_uri;
            proxy_set_header X-Authenticated-User "";
        }

        location = /auth/callback {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/login {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/logout {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /auth/ad-health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /oauth2/auth {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location = /_auth/proxy-identity {
            internal;
            auth_request /oauth2/auth;

            auth_request_set $usuario_raw $upstream_http_x_auth_request_user;
            auth_request_set $preferred_username $upstream_http_x_auth_request_preferred_username;
            auth_request_set $correo_raw $upstream_http_x_auth_request_email;
            auth_request_set $grupos_raw $upstream_http_x_auth_request_groups;

            proxy_pass http://auth_api_backend/auth/proxy-identity;
            proxy_http_version 1.1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Auth-Request-User $usuario_raw;
            proxy_set_header X-Auth-Request-Preferred-Username $preferred_username;
            proxy_set_header X-Auth-Request-Email $correo_raw;
            proxy_set_header X-Auth-Request-Groups $grupos_raw;
            proxy_set_header X-Internal-Proxy nginx-local;
        }
        location @entra_login {
            return 302 /oauth2/start?rd=$scheme://$http_host$request_uri;
        }

        location /auth/ {
            auth_request /_auth/proxy-identity;
            error_page 401 = @entra_login;

            auth_request_set $usuario $upstream_http_x_identity_username;
            auth_request_set $correo $upstream_http_x_identity_email;
            auth_request_set $grupos $upstream_http_x_identity_groups;
            auth_request_set $nombre $upstream_http_x_identity_display_name;

            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Authenticated-User $usuario;
            proxy_set_header X-Authenticated-Email $correo;
            proxy_set_header X-Authenticated-Groups $grupos;
            proxy_set_header X-Authenticated-Display-Name $nombre;
            proxy_set_header X-Auth-Mfa-Policy entra_standard;
            proxy_set_header X-Internal-Proxy nginx-local;
        }

        location = /health {
            proxy_pass http://auth_api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Internal-Proxy nginx-local;
        }
    }
    # Listener interno reusable para servicios humanos detras del mismo patron de autenticacion.
    server {
        listen 8088;
        server_name e3display.com;

        location /oauth2/ {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Auth-Request-Redirect $scheme://$http_host$request_uri;
            proxy_set_header X-Authenticated-User "";
        }

        location = /oauth2/auth {
            proxy_pass http://oauth2_proxy_backend;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Uri $request_uri;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header Content-Length "";
            proxy_pass_request_body off;
        }

        location = /_auth/proxy-identity {
            internal;
            auth_request /oauth2/auth;

            auth_request_set $usuario_raw $upstream_http_x_auth_request_user;
            auth_request_set $preferred_username $upstream_http_x_auth_request_preferred_username;
            auth_request_set $correo_raw $upstream_http_x_auth_request_email;
            auth_request_set $grupos_raw $upstream_http_x_auth_request_groups;

            proxy_pass http://auth_api_backend/auth/proxy-identity;
            proxy_http_version 1.1;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Auth-Request-User $usuario_raw;
            proxy_set_header X-Auth-Request-Preferred-Username $preferred_username;
            proxy_set_header X-Auth-Request-Email $correo_raw;
            proxy_set_header X-Auth-Request-Groups $grupos_raw;
            proxy_set_header X-Internal-Proxy nginx-local;
        }
        location @entra_login_e3os_entraid {
            return 302 /oauth2/start?rd=$scheme://$http_host$request_uri;
        }

        location / {
            auth_request /_auth/proxy-identity;
            error_page 401 = @entra_login_e3os_entraid;

            auth_request_set $usuario $upstream_http_x_identity_username;
            auth_request_set $correo $upstream_http_x_identity_email;
            auth_request_set $grupos $upstream_http_x_identity_groups;
            auth_request_set $nombre $upstream_http_x_identity_display_name;

            proxy_pass http://e3os_entraid_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Authenticated-User $usuario;
            proxy_set_header X-Authenticated-Email $correo;
            proxy_set_header X-Authenticated-Groups $grupos;
            proxy_set_header X-Authenticated-Display-Name $nombre;
            proxy_set_header X-Auth-Mfa-Policy entra_standard;
            proxy_set_header X-Internal-Proxy nginx-local;
        }
    }
}
